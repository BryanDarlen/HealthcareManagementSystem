version: '3.8'

services:
  api:
    build: .
    container_name: noshow-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MODEL_PATH=/app/models/lightgbm_model.pkl
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build: .
    container_name: noshow-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./app:/app/app
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

networks:
  default:
    name: noshow-network
